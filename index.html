<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-MOT-IF 🇫🇷</title>
<style>
    :root {
        --bg: #f8f9fa;
        --primary: #6aaa64; /* LE VERT */
        --accent: #c9b458;  /* ORANGE */
        --gris: #787c7e;    /* GRIS */
        --text: #1a1a1b;    /* NOIR */
        --border: #d3d6da;
    }

    body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; background-color: var(--bg); color: var(--text); margin: 0; padding: 10px; }
    header { text-align: center; margin-bottom: 5px; }
    h1 { margin: 5px 0; letter-spacing: 4px; border-bottom: 3px solid var(--text); font-size: 2rem; }
    .date-heure { font-size: 0.9rem; color: #666; margin-bottom: 10px; height: 20px; font-weight: 500; }

    .grille { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
    .ligne { display: grid; gap: 6px; justify-content: center; }
    .case { width: 52px; height: 52px; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: bold; text-transform: uppercase; background: white; border-radius: 4px; }

    .vert { background-color: var(--primary) !important; color: white; border-color: var(--primary); }
    .orange { background-color: var(--accent) !important; color: white; border-color: var(--accent); }
    .gris { background-color: var(--gris) !important; color: white; border-color: var(--gris); }

    .clavier { display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 500px; padding-bottom: 20px; }
    .clavier-ligne { display: flex; gap: 5px; justify-content: center; }
    .touche { background: #d3d6da; border: none; padding: 18px 0; border-radius: 4px; font-weight: bold; cursor: pointer; flex: 1; text-transform: uppercase; }
    .touche.large { flex: 1.5; font-size: 0.8rem; }

    /* MODALE STATS */
    #modal-stats { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 15px; box-shadow: 0 0 40px rgba(0,0,0,0.4); z-index: 1000; text-align: center; width: 330px; }
    #modal-stats h2 { margin-top: 0; font-size: 1.2rem; color: var(--text); text-transform: uppercase; }
    
    .stats-grid { display: flex; justify-content: space-between; margin: 20px 0; border-bottom: 1px solid #eee; padding-bottom: 15px; }
    .stat-item { display: flex; flex-direction: column; align-items: center; flex: 1; }
    
    /* CHIFFRES EN VERT */
    .stat-val { font-size: 1.6rem; font-weight: bold; color: var(--primary) !important; }
    
    /* LABELS EN NOIR/GRIS FONCÉ */
    .stat-label { font-size: 0.65rem; color: #1a1a1b; text-transform: uppercase; margin-top: 3px; font-weight: 600; }

    .dist-container { text-align: left; margin: 15px 0; color: var(--text); }
    .bar-row { display: flex; align-items: center; margin-bottom: 5px; font-size: 0.8rem; }
    .bar-label { width: 15px; font-weight: bold; }
    .bar-outer { flex-grow: 1; margin-left: 8px; }
    .bar-inner { background: var(--gris); color: white; padding: 2px 8px; border-radius: 3px; font-weight: bold; min-width: 25px; text-align: right; }
    .bar-inner.actuelle { background-color: var(--primary) !important; }

    #timer { font-weight: bold; margin: 15px 0; font-size: 1.1rem; color: var(--text); text-transform: uppercase; }
    #message { height: 30px; font-weight: bold; margin-bottom: 10px; color: var(--text); text-align: center; }

    .btn-partager { padding: 14px; background-color: var(--primary) !important; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1rem; text-transform: uppercase; }
</style>
</head>
<body>

        <div id="distribution" class="dist-container"></div>

        function clean(t, n) { 
        return t.split(/\s+/).map(m => m.trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase()).filter(m => m.length === n); 
    }

    // 1. On prépare les listes
    let MOTS5 = clean(TEXTE_5, 5);
    let MOTS6 = clean(TEXTE_6, 6);

    // 2. FONCTION DE MÉLANGE (Fixe pour tout le monde)
    function shuffle(array) {
        let m = array.length, t, i;
        let seed = 12345; // Ce code garantit le même mélange pour tous
        while (m) {
            seed = (seed * 9301 + 49297) % 233280;
            i = Math.floor((seed / 233280) * m--);
            t = array[m]; array[m] = array[i]; array[i] = t;
        }
        return array;
    }

    // On mélange les listes
    MOTS5 = shuffle(MOTS5);
    MOTS6 = shuffle(MOTS6);
    const TOUS = [...MOTS5, ...MOTS6];

    // 3. Calcul du jour (On commence au 29 Mars 2026 pour être à l'index 0 aujourd'hui)
    const dateRef = new Date("2026-03-29").setHours(0,0,0,0);
    const indexJour = Math.floor((new Date().setHours(0,0,0,0) - dateRef) / 86400000);
    
    // Alternance 5 ou 6 lettres selon le jour
    const longueurDuJour = Math.sin(indexJour * 12.98) > 0 ? 5 : 6;
    
    // Sélection du mot dans la liste mélangée
    const listeDuJour = (longueurDuJour === 5 ? MOTS5 : MOTS6);
    const motDuJour = listeDuJour[indexJour % listeDuJour.length];

    let essai = 0, curseur = 0, proposition = "", fini = false, emojis = [];
        function init() {
            const g = document.getElementById("grille");
            for(let i=0; i<6; i++) {
                const l = document.createElement("div"); l.className="ligne";
                l.style.gridTemplateColumns = `repeat(${longueurDuJour}, 1fr)`;
                for(let j=0; j<longueurDuJour; j++) {
                    const d = document.createElement("div"); d.className="case"; d.id=`c-${i}-${j}`;
                    l.appendChild(d);
                }
                g.appendChild(l);
            }

            const touches = ["AZERTYUIOP", "QSDFGHJKLM", "WXCVBN"];
            const cElt = document.getElementById("clavier");
            touches.forEach((r, i) => {
                const div = document.createElement("div"); div.className="clavier-ligne";
                if(i===2) { const b = document.createElement("button"); b.className="touche large"; b.innerText="ENTER"; b.onclick=valider; div.appendChild(b); }
                r.split("").forEach(l => {
                    const b = document.createElement("button"); b.className="touche"; b.innerText=l; b.id=`key-${l}`; b.onclick=()=>taper(l); div.appendChild(b);
                });
                if(i===2) { const b = document.createElement("button"); b.className="touche large"; b.innerText="DEL"; b.onclick=effacer; div.appendChild(b); }
                cElt.appendChild(div);
            });

            if(localStorage.getItem('fini_' + indexJour)) {
                fini = true;
                const last = JSON.parse(localStorage.getItem('last_game')) || {win: true, essai: 0};
                setTimeout(() => showStats(last.win), 500);
            }
        }

        function taper(l) { if(!fini && proposition.length < longueurDuJour) { document.getElementById(`c-${essai}-${curseur}`).innerText=l; proposition+=l; curseur++; } }
        function effacer() { if(!fini && curseur > 0) { curseur--; proposition=proposition.slice(0,-1); document.getElementById(`c-${essai}-${curseur}`).innerText=""; } }

        function valider() {
            if(fini || proposition.length < longueurDuJour) return;
            if(!TOUS.includes(proposition)) { document.getElementById("message").innerText = "Mot inconnu"; setTimeout(()=>document.getElementById("message").innerText="", 2000); return; }

            let res = new Array(longueurDuJour).fill(0);
            let check = motDuJour.split('');
            for(let i=0; i<longueurDuJour; i++) if(proposition[i]===motDuJour[i]) { res[i]=2; check[i]=null; }
            for(let i=0; i<longueurDuJour; i++) if(res[i]!==2) { let idx=check.indexOf(proposition[i]); if(idx!==-1) { res[i]=1; check[idx]=null; } }

            emojis.push(res.map(v => v===2 ? "🟩" : v===1 ? "🟨" : "⬛").join(''));

            for(let i=0; i<longueurDuJour; i++) {
                const c = document.getElementById(`c-${essai}-${i}`);
                const lettre = proposition[i];
                const cl = res[i]===2 ? "vert" : res[i]===1 ? "orange" : "gris";
                setTimeout(() => {
                    c.classList.add(cl);
                    const t = document.getElementById(`key-${lettre}`);
                    if(t) {
                        if(res[i]===2) t.className = "touche vert";
                        else if(res[i]===1 && !t.classList.contains("vert")) t.className = "touche orange";
                        else if(res[i]===0 && !t.classList.contains("vert") && !t.classList.contains("orange")) t.className = "touche gris";
                    }
                }, i * 100);
            }

            if(proposition === motDuJour) {
                fini = true; setTimeout(() => { confetti(); updateStats(true); }, 1000);
            } else if(essai === 5) {
                fini = true; setTimeout(() => updateStats(false), 1000);
            } else { essai++; curseur=0; proposition=""; }
        }

        function updateStats(win) {
            let s = JSON.parse(localStorage.getItem('stats_motif')) || { p: 0, v: 0, currentS: 0, maxS: 0, dist: [0,0,0,0,0,0] };
            s.p++;
            if(win) {
                s.v++; s.currentS++; s.dist[essai]++;
                if(s.currentS > s.maxS) s.maxS = s.currentS;
            } else { s.currentS = 0; }
            localStorage.setItem('stats_motif', JSON.stringify(s));
            localStorage.setItem('fini_' + indexJour, "true");
            localStorage.setItem('last_game', JSON.stringify({win: win, essai: essai}));
            showStats(win);
        }

        function showStats(win) {
            const s = JSON.parse(localStorage.getItem('stats_motif')) || { p: 0, v: 0, currentS: 0, maxS: 0, dist: [0,0,0,0,0,0] };
            const last = JSON.parse(localStorage.getItem('last_game')) || {win: win, essai: 0};
            
            document.getElementById("resultat-titre").innerText = win ? "BRAVO ! 🎉" : "DOMMAGE... 🧊";
            document.getElementById("stats-summary").innerHTML = `
                <div class="stat-item"><span class="stat-val">${s.p}</span><span class="stat-label">Jouées</span></div>
                <div class="stat-item"><span class="stat-val">${s.p > 0 ? Math.round((s.v/s.p)*100) : 0}</span><span class="stat-label">% Victoire</span></div>
                <div class="stat-item"><span class="stat-val">${s.currentS}</span><span class="stat-label">Série</span></div>
                <div class="stat-item"><span class="stat-val">${s.maxS}</span><span class="stat-label">Record</span></div>
            `;

            let distHTML = "";
            const maxVal = Math.max(...s.dist, 1);
            for(let i=0; i<6; i++) {
                const pct = (s.dist[i]/maxVal) * 100;
                // ICI LA LOGIQUE DE COULEUR : Vert si c'est la ligne gagnante actuelle
                const estActuelle = (win && i === last.essai);
                distHTML += `
                    <div class="bar-row">
                        <div class="bar-label">${i+1}</div>
                        <div class="bar-outer"><div class="bar-inner ${estActuelle ? 'actuelle' : ''}" style="width:${Math.max(pct, 8)}%">${s.dist[i]}</div></div>
                    </div>`;
            }
            document.getElementById("distribution").innerHTML = distHTML;
            document.getElementById("modal-stats").style.display = "block";
        }

        function partager() {
            const scoreStr = fini && essai < 6 && document.getElementById("resultat-titre").innerText.includes("BRAVO") ? (essai + 1) : "X";
            const texte = `E-MOT-IF 🇫🇷 n°${indexJour}\nScore: ${scoreStr}/6\n\n${emojis.join('\n')}\nhttps://e-mot-if.vercel.app`;
            navigator.clipboard.writeText(texte).then(() => alert("Score copié !"));
        }

        setInterval(() => {
            const mtn = new Date();
            document.getElementById('date-complete').innerText = mtn.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'}) + " • " + mtn.toLocaleTimeString('fr-FR');
            const demain = new Date(); demain.setHours(24,0,0,0);
            const diff = demain - mtn;
            const h = String(Math.floor(diff/3600000)).padStart(2, '0');
            const m = String(Math.floor((diff%3600000)/60000)).padStart(2, '0');
            const s = String(Math.floor((diff%60000)/1000)).padStart(2, '0');
            document.getElementById('timer').innerText = `PROCHAIN MOT : ${h}:${m}:${s}`;
        }, 1000);

        window.addEventListener("keydown", (e) => {
            if(!fini) { if(e.key==="Enter") valider(); else if(e.key==="Backspace") effacer(); else if(/^[a-zA-Z]$/.test(e.key)) taper(e.key.toUpperCase()); }
        });

        init();
    </script>
</body>
</html>
